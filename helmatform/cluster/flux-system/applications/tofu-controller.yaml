---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 1h0s
  url: https://flux-iac.github.io/tofu-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  chart:
    spec:
      chart: tofu-controller
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
      version: '>=0.16.4'
  interval: 1h0s
  releaseName: tofu-controller
  targetNamespace: flux-system
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    replicaCount: 3
    concurrency: 24
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 400m
        memory: 64Mi
    caCertValidityDuration: 24h
    certRotationCheckFrequency: 30m
    image:
      tag: v0.16.4
    runner:
      image:
        tag: v0.16.4
      grpc:
        maxMessageSize: 30
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: helmatform
spec:
  interval: 1m
  url: https://github.com/hojatm-huma/helmatform
  ref:
    branch: main
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-s3
  namespace: sample-app
data:
  bucket_name: helmatform-sample-app-s3-in-ns
  iam_user_name: helmatform-sample-app-s3-in-ns
---
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: sample-app-s3
  namespace: sample-app
spec:
  interval: 5s
  approvePlan: auto
  path: ./tf-modules/s3/
  sourceRef:
    kind: GitRepository
    name: helmatform
    namespace: flux-system
  varsFrom:
    - kind: ConfigMap
      name: sample-app-s3
  writeOutputsToSecret:
    name: sample-app-s3-outputs
  runnerPodTemplate:
    spec:
      envFrom:
        - secretRef:
            name: aws-creds