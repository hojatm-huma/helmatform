apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: helmatform
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/hojatm-huma/helmatform
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
spec:
  sourceRef:
    kind: GitRepository
    name: helmatform
  path: ./app-k8s/flux-system/applications
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds
spec:
  sourceRef:
    kind: GitRepository
    name: helmatform
  path: ./app-k8s/flux-system/crds
