apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: helmatform-chart
  namespace: flux-system
spec:
  interval: 5m0s
  url: oci://ghcr.io/hojatm-huma/helmatform-chart
  secretRef:
    name: ghcr-secret
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "0.1.0"
---
apiVersion: v1
kind: Namespace
metadata:
  name: sample-app
  labels:
    name: sample-app
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: sample-app
  namespace: sample-app
spec:
  interval: 1m
  url: https://github.com/hojatm-huma/sample-app
  ref:
    branch: main
---
apiVersion: source.extensions.fluxcd.io/v1beta1
kind: ArtifactGenerator
metadata:
  name: sample-app
  namespace: sample-app
spec:
  sources:
    - alias: chart
      kind: OCIRepository
      name: helmatform-chart
      namespace: flux-system
    - alias: repo
      kind: GitRepository
      name: sample-app
      namespace: sample-app
  artifacts:
    - name: sample-app
      originRevision: "@chart"
      copy:
        - from: "@chart/"
          to: "@artifact/"
        - from: "@repo/deploy/values.yaml"
          to: "@artifact/base-chart/values.yaml"
          strategy: Merge
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sample-app
  namespace: sample-app
spec:
  interval: 1m
  chartRef:
    kind: ExternalArtifact
    name: sample-app
