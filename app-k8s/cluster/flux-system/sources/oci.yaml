apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: base-chart
  namespace: flux-system
spec:
  interval: 5m0s
  url: oci://ghcr.io/hojatm-huma/base-chart
  secretRef:
    name: ghcr-secret
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "0.1.0"
